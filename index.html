<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>AKUNA ASCENT | 4:30 GRIND MODE</title>

<!-- PWA Meta pour installation sur iPhone/Android -->
<link rel="manifest" href="/manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="AKUNA ASCENT">
<link rel="apple-touch-icon" href="/icon.svg">
<meta name="theme-color" content="#c084fc">

<style>
/* ===== VARIABLES SYSTEM ===== */
:root {
  --bg: #03050a;
  --bg2: #0a0d16;
  --card: #0f131e;
  --card2: #151b28;
  --purple: #c084fc;
  --purple-dark: #9b5ce8;
  --orange: #ff6b2b;
  --cyan: #00e5ff;
  --green: #39ff7c;
  --red: #ff4757;
  --gold: #ffd32b;
  --pink: #ff66cc;
  --blue: #3b82f6;
  --text: #f0f2ff;
  --dim: #7e8aa8;
  --border: rgba(255,255,255,0.06);
  --glow-p: rgba(192,132,252,0.25);
  --glow-o: rgba(255,107,43,0.2);
  --font-main: system-ui, -apple-system, 'Inter', sans-serif;
  --font-mono: 'SF Mono', 'JetBrains Mono', monospace;
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  -webkit-tap-highlight-color: transparent;
}

body {
  font-family: var(--font-main);
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
  position: relative;
}

/* ===== DYNAMIC BACKGROUND ===== */
.bg-dynamic {
  position: fixed;
  inset: 0;
  z-index: 0;
  pointer-events: none;
}

.bg-gradient {
  position: absolute;
  width: 100%;
  height: 100%;
  background: radial-gradient(ellipse at 30% 40%, rgba(192,132,252,0.08) 0%, transparent 60%),
              radial-gradient(ellipse at 80% 70%, rgba(255,107,43,0.05) 0%, transparent 55%);
  animation: bgFloat 22s ease-in-out infinite alternate;
}

@keyframes bgFloat {
  0% { opacity: 0.5; transform: scale(1); }
  100% { opacity: 1; transform: scale(1.08); }
}

.noise {
  position: absolute;
  inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 400 400' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
  pointer-events: none;
  opacity: 0.5;
}

.scanlines {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 1;
  background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.08) 2px, rgba(0,0,0,0.08) 4px);
}

/* ===== HEADER ===== */
header {
  position: sticky;
  top: 0;
  z-index: 100;
  background: rgba(3,5,10,0.94);
  backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 20px;
  height: 60px;
}

.logo {
  font-size: 1.3rem;
  font-weight: 900;
  letter-spacing: -0.5px;
  text-transform: uppercase;
  display: flex;
  align-items: baseline;
  gap: 5px;
}

.logo-main {
  background: linear-gradient(135deg, #fff, var(--purple), var(--orange));
  -webkit-background-clip: text;
  background-clip: text;
  color: transparent;
}

.logo-accent {
  color: var(--purple);
}

.header-right {
  display: flex;
  align-items: center;
  gap: 10px;
}

.live-clock {
  font-family: var(--font-mono);
  font-size: 0.7rem;
  font-weight: 700;
  letter-spacing: 1px;
  color: var(--cyan);
  background: rgba(0,229,255,0.08);
  border: 1px solid rgba(0,229,255,0.2);
  padding: 5px 10px;
  border-radius: 30px;
}

.icon-btn {
  background: rgba(255,255,255,0.03);
  border: 1px solid var(--border);
  color: var(--dim);
  cursor: pointer;
  padding: 6px 10px;
  border-radius: 10px;
  transition: all 0.2s;
  display: flex;
  align-items: center;
  gap: 5px;
  font-size: 0.7rem;
  font-weight: 600;
}

.icon-btn:hover {
  background: var(--purple);
  color: black;
  border-color: var(--purple);
}

.admin-badge {
  display: none;
  background: rgba(255,107,43,0.2);
  border: 1px solid rgba(255,107,43,0.5);
  color: var(--orange);
  font-size: 0.5rem;
  font-weight: 900;
  padding: 2px 8px;
  border-radius: 20px;
}

body.admin-mode .admin-badge { display: inline-block; }
body.admin-mode .admin-only { display: flex !important; }
.admin-only { display: none !important; }

/* ===== QUOTE BAR ===== */
.quote-bar {
  padding: 8px 20px;
  background: linear-gradient(90deg, rgba(192,132,252,0.08), rgba(255,107,43,0.04));
  border-bottom: 1px solid rgba(192,132,252,0.15);
  display: flex;
  align-items: center;
  gap: 12px;
  cursor: pointer;
  transition: 0.2s;
}

.quote-bar:hover {
  background: linear-gradient(90deg, rgba(192,132,252,0.12), rgba(255,107,43,0.07));
}

.quote-icon {
  color: var(--orange);
  font-size: 0.7rem;
}

.quote-text {
  font-size: 0.7rem;
  font-weight: 700;
  letter-spacing: 0.5px;
  text-transform: uppercase;
  color: var(--purple);
  flex: 1;
}

.quote-counter {
  font-size: 0.55rem;
  color: var(--dim);
  font-family: var(--font-mono);
}

/* ===== STATS ROW ===== */
.stats-row {
  padding: 12px 20px;
  display: flex;
  align-items: center;
  gap: 15px;
  border-bottom: 1px solid var(--border);
  background: var(--bg2);
  flex-wrap: wrap;
}

.progress-ring {
  position: relative;
  width: 56px;
  height: 56px;
  flex-shrink: 0;
}

.progress-ring svg { transform: rotate(-90deg); }

.ring-text {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 0.7rem;
  font-weight: 900;
  color: var(--purple);
}

.stats-info { flex: 1; }
.stats-day { font-size: 1rem; font-weight: 900; text-transform: uppercase; }
.stats-sub { font-size: 0.6rem; color: var(--dim); margin-top: 2px; }

.streak-badge {
  display: flex;
  align-items: center;
  gap: 8px;
  background: rgba(255,107,43,0.1);
  border: 1px solid rgba(255,107,43,0.25);
  border-radius: 40px;
  padding: 5px 12px;
}

.streak-num { font-size: 1.2rem; font-weight: 900; color: var(--orange); }
.streak-lab { font-size: 0.5rem; font-weight: 800; text-transform: uppercase; }

.total-tasks-badge {
  background: rgba(192,132,252,0.1);
  border: 1px solid rgba(192,132,252,0.2);
  border-radius: 40px;
  padding: 5px 12px;
  text-align: center;
}

.total-tasks-num { font-size: 1rem; font-weight: 900; color: var(--purple); }
.total-tasks-lab { font-size: 0.5rem; color: var(--dim); }

/* ===== PROGRESS BAR ===== */
.top-progress {
  position: sticky;
  top: 60px;
  z-index: 99;
  height: 2px;
  background: rgba(255,255,255,0.05);
}

.top-progress-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--purple), var(--orange));
  transition: width 0.5s ease;
}

/* ===== DAY NAV ===== */
.day-nav {
  display: flex;
  gap: 6px;
  padding: 10px 20px;
  overflow-x: auto;
  border-bottom: 1px solid var(--border);
}

.day-nav::-webkit-scrollbar { height: 2px; }

.day-btn {
  padding: 6px 16px;
  background: rgba(255,255,255,0.02);
  border: 1px solid var(--border);
  color: var(--dim);
  border-radius: 40px;
  cursor: pointer;
  font-size: 0.7rem;
  font-weight: 800;
  text-transform: uppercase;
  transition: all 0.2s;
  white-space: nowrap;
  flex-shrink: 0;
}

.day-btn.active {
  background: var(--purple);
  color: black;
  border-color: var(--purple);
  box-shadow: 0 0 15px rgba(192,132,252,0.5);
}

.road-btn {
  border-color: rgba(255,107,43,0.3);
  color: var(--orange);
}

.road-btn.active {
  background: var(--orange);
  color: black;
  border-color: var(--orange);
}

/* ===== VIEW TOGGLE ===== */
.view-toggle {
  display: flex;
  gap: 6px;
  padding: 8px 20px;
  border-bottom: 1px solid var(--border);
}

.view-btn {
  padding: 5px 16px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--dim);
  border-radius: 30px;
  cursor: pointer;
  font-size: 0.65rem;
  font-weight: 800;
  text-transform: uppercase;
  transition: 0.2s;
}

.view-btn.active {
  background: var(--card2);
  color: var(--text);
  border-color: var(--purple);
}

/* ===== MAIN CONTENT ===== */
.main-content {
  padding: 20px;
  padding-bottom: 100px;
  position: relative;
  z-index: 2;
}

/* ===== LEGEND ===== */
.legend {
  display: flex;
  flex-wrap: wrap;
  gap: 8px 15px;
  margin-bottom: 15px;
  padding: 10px 15px;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 12px;
}

.leg-item {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 0.65rem;
  color: var(--dim);
}

.leg-dot { width: 8px; height: 8px; border-radius: 2px; }

/* ===== TIMELINE ===== */
.timeline { display: flex; flex-direction: column; gap: 4px; }

.tl-block {
  display: flex;
  gap: 12px;
  padding: 12px;
  border-radius: 12px;
  border-left: 3px solid;
  align-items: flex-start;
  transition: 0.2s;
  background: var(--card);
  position: relative;
}

.tl-block:hover { transform: translateX(3px); background: var(--card2); }

.tl-block.now-active { animation: nowPulse 2s ease-in-out infinite; }

@keyframes nowPulse {
  0%, 100% { box-shadow: 0 0 0 0 rgba(192,132,252,0.3); }
  50% { box-shadow: 0 0 0 5px rgba(192,132,252,0.1); }
}

.now-badge {
  position: absolute;
  top: -8px;
  right: 8px;
  background: linear-gradient(135deg, var(--purple), var(--orange));
  color: black;
  font-size: 0.5rem;
  font-weight: 900;
  padding: 2px 8px;
  border-radius: 20px;
  text-transform: uppercase;
}

.tl-time {
  font-family: var(--font-mono);
  font-size: 0.65rem;
  color: var(--purple);
  min-width: 85px;
  flex-shrink: 0;
}

.tl-label { font-size: 0.85rem; font-weight: 800; }
.tl-note { font-size: 0.65rem; color: var(--dim); margin-top: 3px; }

.tl-note-btn {
  background: none;
  border: none;
  cursor: pointer;
  padding: 5px;
  border-radius: 6px;
  color: var(--dim);
}

.tl-note-btn:hover { background: rgba(192,132,252,0.15); color: var(--purple); }

/* ===== CARDS ===== */
.cards-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
  gap: 12px;
}

.session-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 14px;
  display: flex;
  gap: 12px;
  transition: 0.2s;
}

.session-card:hover {
  transform: translateY(-2px);
  border-color: rgba(192,132,252,0.4);
}

.session-card.completed { opacity: 0.6; }

.check-box {
  width: 22px;
  height: 22px;
  border-radius: 8px;
  border: 2px solid var(--border);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}

.check-box.checked { background: var(--green); border-color: var(--green); }

.card-content { flex: 1; }
.card-time { font-family: var(--font-mono); font-size: 0.65rem; color: var(--purple); }
.card-title { font-size: 0.85rem; font-weight: 800; margin: 3px 0; }
.card-sub { font-size: 0.65rem; color: var(--dim); }

.card-note-preview {
  margin-top: 8px;
  padding: 6px 8px;
  background: rgba(192,132,252,0.08);
  border-left: 2px solid var(--purple);
  border-radius: 6px;
  font-size: 0.6rem;
}

.card-actions { display: flex; flex-direction: column; gap: 6px; }

.action-btn {
  background: none;
  border: none;
  cursor: pointer;
  padding: 4px;
  border-radius: 6px;
  color: var(--dim);
}

.action-btn:hover { background: rgba(255,255,255,0.05); }
.action-btn.note:hover { color: var(--purple); }
.action-btn.edit:hover { color: var(--cyan); }
.action-btn.del:hover { color: var(--red); }

/* ===== ROADMAP ===== */
.roadmap-wrap { max-width: 700px; margin: 0 auto; }

.week-stats {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
  gap: 10px;
  margin-bottom: 20px;
}

.stat-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 12px;
  text-align: center;
}

.stat-num { font-size: 1.5rem; font-weight: 900; }
.stat-lab { font-size: 0.6rem; color: var(--dim); text-transform: uppercase; margin-top: 3px; }

.hl-box {
  background: linear-gradient(135deg, rgba(192,132,252,0.08), rgba(255,107,43,0.04));
  border: 1px solid rgba(192,132,252,0.2);
  border-radius: 14px;
  padding: 15px;
  margin-bottom: 20px;
}

.hl-title { font-size: 0.9rem; font-weight: 900; margin-bottom: 5px; }
.hl-desc { font-size: 0.7rem; color: var(--dim); line-height: 1.5; }

.road { position: relative; margin: 15px 0; }
.road-line { position: absolute; left: 14px; top: 0; bottom: 0; width: 1.5px; background: var(--purple); }

.road-item {
  display: flex;
  gap: 14px;
  margin-bottom: 20px;
  position: relative;
  z-index: 1;
}

.road-dot {
  width: 28px;
  height: 28px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 0.7rem;
  font-weight: 900;
  flex-shrink: 0;
  background: var(--card2);
  border: 1px solid var(--purple);
}

.road-title { font-size: 0.8rem; font-weight: 800; margin-bottom: 3px; display: flex; flex-wrap: wrap; gap: 5px; }
.road-desc { font-size: 0.65rem; color: var(--dim); line-height: 1.5; }

.road-badge {
  font-size: 0.5rem;
  padding: 2px 6px;
  border-radius: 20px;
  font-weight: 800;
}

.b-now { background: rgba(57,255,124,0.2); color: var(--green); }
.b-mid { background: rgba(192,132,252,0.2); color: var(--purple); }
.b-lng { background: rgba(255,107,43,0.2); color: var(--orange); }

.tip-card {
  background: var(--card);
  border-left: 3px solid var(--purple);
  border-radius: 0 10px 10px 0;
  padding: 10px 14px;
  font-size: 0.7rem;
  color: var(--dim);
  line-height: 1.5;
  margin-bottom: 8px;
}

/* ===== PANELS ===== */
.panel-overlay {
  position: fixed;
  top: 0;
  right: -100%;
  width: min(450px, 100%);
  height: 100%;
  background: rgba(10,13,22,0.98);
  backdrop-filter: blur(20px);
  border-left: 1px solid var(--border);
  z-index: 200;
  transition: right 0.3s;
  display: flex;
  flex-direction: column;
}

.panel-overlay.open { right: 0; }

.panel-header {
  padding: 18px;
  border-bottom: 1px solid var(--border);
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.panel-title { font-size: 1rem; font-weight: 900; }
.panel-sub { font-size: 0.65rem; color: var(--purple); margin-top: 3px; }

.panel-body {
  flex: 1;
  overflow-y: auto;
  padding: 18px;
}

.input-field {
  width: 100%;
  background: var(--card);
  border: 1px solid var(--border);
  padding: 12px;
  color: var(--text);
  border-radius: 10px;
  font-size: 0.85rem;
  outline: none;
  margin-bottom: 12px;
}

.input-field:focus { border-color: var(--purple); }

textarea.input-field { resize: vertical; min-height: 150px; }
select.input-field { cursor: pointer; }

.form-label {
  font-size: 0.6rem;
  color: var(--dim);
  text-transform: uppercase;
  letter-spacing: 0.5px;
  display: block;
  margin-bottom: 4px;
}

.btn-primary {
  width: 100%;
  background: linear-gradient(135deg, var(--purple), var(--purple-dark));
  color: black;
  border: none;
  padding: 12px;
  border-radius: 40px;
  font-weight: 900;
  font-size: 0.75rem;
  cursor: pointer;
  text-transform: uppercase;
  transition: 0.2s;
}

.btn-primary:hover { transform: scale(1.01); box-shadow: 0 0 15px rgba(192,132,252,0.4); }

.btn-danger {
  background: linear-gradient(135deg, var(--red), #ff2f40);
  margin-top: 10px;
}

.note-saved {
  background: var(--card2);
  border-radius: 10px;
  padding: 12px;
  margin-bottom: 15px;
  font-size: 0.7rem;
  border-left: 2px solid var(--purple);
}

/* ===== TIMER ===== */
.timer-fab {
  position: fixed;
  bottom: 20px;
  right: 20px;
  z-index: 90;
  background: linear-gradient(135deg, var(--purple), var(--orange));
  color: black;
  border: none;
  width: 54px;
  height: 54px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  font-size: 1.2rem;
  box-shadow: 0 4px 20px rgba(192,132,252,0.5);
  transition: 0.2s;
}

.timer-fab:hover { transform: scale(1.05); }

.timer-panel {
  position: fixed;
  bottom: 85px;
  right: 20px;
  z-index: 89;
  background: var(--bg2);
  border: 1px solid rgba(192,132,252,0.3);
  border-radius: 20px;
  padding: 15px;
  width: 210px;
  display: none;
  backdrop-filter: blur(16px);
}

.timer-panel.show { display: block; }

.timer-disp {
  font-family: var(--font-mono);
  font-size: 2rem;
  font-weight: 900;
  color: var(--purple);
  text-align: center;
  letter-spacing: 3px;
}

.timer-label {
  font-size: 0.55rem;
  text-align: center;
  color: var(--dim);
  margin: 5px 0;
}

.timer-modes { display: flex; gap: 5px; margin-bottom: 10px; }

.tmode-btn {
  flex: 1;
  padding: 5px;
  border-radius: 30px;
  border: 1px solid var(--border);
  background: var(--card);
  color: var(--dim);
  font-size: 0.6rem;
  font-weight: 800;
  cursor: pointer;
}

.tmode-btn.active { border-color: var(--purple); color: var(--purple); }

.timer-btns { display: flex; gap: 8px; }

.t-start, .t-reset {
  flex: 1;
  padding: 6px;
  border-radius: 30px;
  font-weight: 800;
  font-size: 0.6rem;
  cursor: pointer;
}

.t-start { background: var(--green); color: #052e16; border: none; }
.t-reset { background: var(--card); border: 1px solid var(--border); color: var(--dim); }

/* ===== BACKDROP & TOAST ===== */
#backdrop {
  display: none;
  position: fixed;
  inset: 0;
  z-index: 150;
  background: rgba(0,0,0,0.6);
  backdrop-filter: blur(3px);
}

.toast {
  position: fixed;
  bottom: 30px;
  left: 50%;
  transform: translateX(-50%) translateY(100px);
  background: var(--card2);
  border: 1px solid var(--purple);
  border-radius: 40px;
  padding: 8px 20px;
  font-size: 0.7rem;
  font-weight: 700;
  z-index: 300;
  transition: transform 0.3s;
  white-space: nowrap;
}

.toast.show { transform: translateX(-50%) translateY(0); }

/* ===== ADD BUTTON ===== */
.admin-add-wrap { padding: 0 20px 20px; }

.add-btn {
  width: 100%;
  padding: 12px;
  background: rgba(192,132,252,0.08);
  border: 1px dashed rgba(192,132,252,0.3);
  color: var(--purple);
  border-radius: 40px;
  cursor: pointer;
  font-weight: 800;
  font-size: 0.7rem;
  text-transform: uppercase;
}

.add-btn:hover { background: rgba(192,132,252,0.15); }

.empty { text-align: center; padding: 40px 20px; color: var(--dim); }

/* ===== RESPONSIVE ===== */
@media (max-width: 600px) {
  header, .stats-row, .day-nav, .view-toggle, .quote-bar, .admin-add-wrap {
    padding-left: 12px;
    padding-right: 12px;
  }
  .main-content { padding: 12px; }
  .cards-grid { grid-template-columns: 1fr; }
  .tl-time { min-width: 70px; font-size: 0.6rem; }
  .tl-label { font-size: 0.8rem; }
  .toast { white-space: normal; text-align: center; max-width: 85%; }
}

/* ===== CATEGORY COLORS ===== */

const CHECKLIST_CATS = ['c-co', 'c-fc', 'c-bz', 'c-rv', 'c-dev', 'c-ong'];

// ==================== FONCTIONS UTILES ====================
function timeToMinutes(timeStr) {
  let startTime = timeStr.split(/[–—\-]/)[0].trim();
  let match = startTime.match(/(\d+)[h:](\d*)/);
  if (match) {
    let hours = parseInt(match[1]);
    let minutes = parseInt(match[2] || '0');
    return hours * 60 + minutes;
  }
  return 9999;
}

function sortBlocksByTime(blocks) {
  return blocks.sort((a, b) => timeToMinutes(a.t) - timeToMinutes(b.t));
}

function showToast(msg) {
  let t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

function updateStreak() {
  let today = new Date().toDateString();
  let blocks = sched[currentDay]?.blocks || [];
  let cl = blocks.filter(b => CHECKLIST_CATS.includes(b.c));
  if (!cl.length) return;
  let allDone = cl.every((_, i) => checks[`${currentDay}-${i}`]);
  if (allDone && streak.lastDate !== today) {
    streak.count++;
    streak.lastDate = today;
    localStorage.setItem('akuna_final_streak', JSON.stringify(streak));
  }
  document.getElementById('streakNum').innerText = streak.count;
}

function updateTotalTasks() {
  let total = 0;
  for (let day of ['lun', 'mar', 'mer', 'jeu', 'ven', 'sam', 'dim']) {
    total += (sched[day]?.blocks || []).filter(b => CHECKLIST_CATS.includes(b.c)).length;
  }
  document.getElementById('totalTasksNum').innerText = total;
}

function updateStats() {
  if (currentDay === 'road') {
    document.getElementById('dayLabel').innerHTML = '🚀 Roadmap';
    document.getElementById('statsCounter').innerHTML = 'Vision 12 mois';
    document.getElementById('ringText').innerHTML = '🎯';
    document.getElementById('ringCircle').style.strokeDashoffset = '150.8';
    document.getElementById('topFill').style.width = '0%';
    return;
  }
  let blocks = sched[currentDay]?.blocks || [];
  let cl = blocks.filter(b => CHECKLIST_CATS.includes(b.c));
  let total = cl.length, done = 0;
  cl.forEach((_, i) => { if (checks[`${currentDay}-${i}`]) done++; });
  let pct = total ? Math.round((done / total) * 100) : 0;
  let circ = 150.8;
  document.getElementById('ringCircle').style.strokeDashoffset = circ - (pct / 100) * circ;
  document.getElementById('ringText').innerHTML = pct + '%';
  document.getElementById('statsCounter').innerHTML = `${done} / ${total} tâches`;
  document.getElementById('dayLabel').innerHTML = sched[currentDay]?.label || currentDay;
  document.getElementById('topFill').style.width = pct + '%';
  updateStreak();
  updateTotalTasks();
}

function isNow(t) {
  let s = timeToMinutes(t);
  let parts = t.split(/[–—\-]/);
  let e = parts.length > 1 ? timeToMinutes(parts[1]) : s + 60;
  let now = new Date().getHours() * 60 + new Date().getMinutes();
  return now >= s && now < e;
}

  return `<div class="legend">${Object.entries(cats).map(([k, v]) => `<div class="leg-item"><div class="leg-dot" style="background:${colors[k]}"></div>${v}</div>`).join('')}</div>`;
}

function renderTimeline() {
  let blocks = sched[currentDay]?.blocks || [];

    let active = isNow(b.t);
    let hasNote = notes[`${currentDay}-${i}`]?.text;

      ${active ? '<div class="now-badge">🔴 LIVE</div>' : ''}

function renderCards() {

  syncToServer({ action: 'toggle', day: currentDay, index: i, completed: checks[id] });

  activeIdx = i;

  let text = document.getElementById('noteInput').value.trim();
  if (!text) { showToast('⚠️ Note vide'); return; }
  let id = `${currentDay}-${activeIdx}`;
  notes[id] = { text, date: new Date().toLocaleString('fr-FR') };
  localStorage.setItem('akuna_final_notes', JSON.stringify(notes));
  closePanel('notePanel');
  showToast('📝 Note enregistrée');
  render();
  syncToServer({ action: 'note', day: currentDay, index: activeIdx, note: text });
}

function clearNote() {
  let id = `${currentDay}-${activeIdx}`;
  delete notes[id];
  localStorage.setItem('akuna_final_notes', JSON.stringify(notes));
  closePanel('notePanel');
  showToast('🗑 Note effacée');
  render();
}

function openAdmin(i) {
  if (!isAdmin) return;
  activeIdx = i;
  document.getElementById('adminTitle').innerText = i === null ? '➕ Ajouter' : '✏️ Modifier';
  if (i !== null) {
    let b = sched[currentDay].blocks[i];
    document.getElementById('admTime').value = b.t;
    document.getElementById('admTitle').value = b.l;
    document.getElementById('admDesc').value = b.n || '';
    document.getElementById('admCat').value = b.c;
    document.getElementById('adminDelBtn').style.display = 'block';
  } else {
    document.getElementById('admTime').value = '';
    document.getElementById('admTitle').value = '';
    document.getElementById('admDesc').value = '';
    document.getElementById('admCat').value = 'c-co';
    document.getElementById('adminDelBtn').style.display = 'none';
  }
  openPanel('adminPanel');
}

function saveAdmin() {
  let t = document.getElementById('admTime').value.trim();
  let l = document.getElementById('admTitle').value.trim();
  let n = document.getElementById('admDesc').value.trim();
  let c = document.getElementById('admCat').value;
  if (!t || !l) { showToast('⚠️ Heure et titre requis'); return; }
  
  if (activeIdx === null) {
    sched[currentDay].blocks.push({ t, l, n, c });
  } else {
    sched[currentDay].blocks[activeIdx] = { t, l, n, c };
  }
  
  // TRI AUTOMATIQUE PAR HEURE
  sched[currentDay].blocks = sortBlocksByTime(sched[currentDay].blocks);
  
  localStorage.setItem('akuna_final_sched', JSON.stringify(sched));
  closePanel('adminPanel');
  showToast('✅ Bloc sauvegardé');
  render();
  
  // Synchronisation serveur
  syncToServer({ action: 'save', day: currentDay, time: t, title: l, desc: n, category: c });
}

function deleteBlock() {
  if (activeIdx === null) return;
  sched[currentDay].blocks.splice(activeIdx, 1);
  localStorage.setItem('akuna_final_sched', JSON.stringify(sched));
  closePanel('adminPanel');
  showToast('🗑 Bloc supprimé');
  render();
}

function toggleAdmin() {
  if (!isAdmin) {
    let code = prompt('🔐 Code Admin (4h30) :');
    if (code === ADMIN_PASS) {
      isAdmin = true;
      document.body.classList.add('admin-mode');
      showToast('🔓 Mode Admin activé');
    } else if (code !== null) showToast('❌ Code incorrect');
  } else {
    isAdmin = false;
    document.body.classList.remove('admin-mode');
    showToast('🔒 Mode Admin désactivé');
  }
}

function changeDay(day, btn) {
  currentDay = day;
  document.querySelectorAll('.day-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  render();
}

function setView(view, btn) {
  currentView = view;
  document.querySelectorAll('.view-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  render();
}

function nextQuote() {
  quoteIdx = (quoteIdx + 1) % TOTAL_QUOTES;
  let el = document.getElementById('quoteText');
  let counter = document.getElementById('quoteCounter');
  el.style.opacity = '0';
  setTimeout(() => {
    el.textContent = QUOTES[quoteIdx];
    el.style.opacity = '1';
    counter.textContent = `${quoteIdx + 1}/${TOTAL_QUOTES}`;
  }, 200);
}

function openPanel(id) {
  document.getElementById(id).classList.add('open');
  document.getElementById('backdrop').style.display = 'block';
  document.body.style.overflow = 'hidden';
}

function closePanel(id) {
  document.getElementById(id).classList.remove('open');
  document.getElementById('backdrop').style.display = 'none';
  document.body.style.overflow = '';

function closeAllPanels() {
  document.querySelectorAll('.panel-overlay').forEach(p => p.classList.remove('open'));
  document.getElementById('backdrop').style.display = 'none';
  document.body.style.overflow = '';
}

// ==================== TIMER ====================
function toggleTimerPanel() { document.getElementById('timerPanel').classList.toggle('show'); }
function setTimerMode(mins, btn) {
  timerModeMins = mins; timerSecs = mins * 60;
  timerRunning = false; clearInterval(timerInterval);
  document.querySelectorAll('.tmode-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('timerLbl').innerHTML = `FOCUS · ${mins} MIN`;
  updateTimerDisp();
  document.getElementById('timerStartBtn').innerHTML = 'START';
}
function toggleTimerRun() {
  if (timerRunning) {
    clearInterval(timerInterval); timerRunning = false;
    document.getElementById('timerStartBtn').innerHTML = 'RESUME';
  } else {
    timerRunning = true;
    document.getElementById('timerStartBtn').innerHTML = 'PAUSE';
    timerInterval = setInterval(() => {
      timerSecs--;
      if (timerSecs <= 0) {
        clearInterval(timerInterval); timerRunning = false;
        document.getElementById('timerStartBtn').innerHTML = 'START';
        showToast('⏰ Timer terminé !');
        if (navigator.vibrate) navigator.vibrate([200, 100, 200]);
      }
      updateTimerDisp();
    }, 1000);
  }
}
function resetTimer() {
  clearInterval(timerInterval); timerRunning = false;
  timerSecs = timerModeMins * 60;
  document.getElementById('timerStartBtn').innerHTML = 'START';
  updateTimerDisp();
}
function updateTimerDisp() {
  let m = Math.floor(timerSecs / 60), s = timerSecs % 60;
  document.getElementById('timerDisp').innerHTML = `${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;
}

// ==================== SYNC SERVEUR (OPTIONNEL) ====================
let isOnline = navigator.onLine;
let syncQueue = [];

window.addEventListener('online', () => {
  isOnline = true;
  showToast('🌐 Connecté - synchronisation...');
  processSyncQueue();
});

window.addEventListener('offline', () => {
  isOnline = false;
  showToast('📴 Mode hors ligne');
});

async function syncToServer(data) {
  if (isOnline) {
    try {
      const response = await fetch('/api/sync.php', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(data)
      });
      if (response.ok) console.log('✅ Synced');
    } catch (e) {
      syncQueue.push(data);
      localStorage.setItem('akuna_sync_queue', JSON.stringify(syncQueue));
    }
  } else {
    syncQueue.push(data);
    localStorage.setItem('akuna_sync_queue', JSON.stringify(syncQueue));
  }
}

async function processSyncQueue() {
  const queue = JSON.parse(localStorage.getItem('akuna_sync_queue') || '[]');
  if (queue.length === 0) return;
  for (const item of queue) {
    try {
      await fetch('/api/sync.php', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(item)
      });
    } catch (e) {}
  }
  localStorage.setItem('akuna_sync_queue', '[]');
  showToast('✅ Synchronisation terminée');
}
